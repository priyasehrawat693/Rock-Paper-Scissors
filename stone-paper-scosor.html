<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="stone_style.css">
</head>
<body>
   <h1>Rock  Paper  Scissors  Game</h1>
   <div class="choices">
       <div class="choice" id="rock">
           <img src="rock.png">
       </div>
       <div class="choice" id="paper">
              <img src="paper.png">
       </div>
       <div class="choice" id="scissor">
              <img src="secissor.png">
       </div>
   </div>

    <div class="score-board">
       <div class="score" >
           <p id="user-score">0</p>
           <p>You</p>
       </div>
       <div class="score" >
             <p id="comp-score">0</p>
             <p>Comp</p>
       </div>
    </div>

   <div class="msg-container">
        <p id="msg">Play Your Move</p>
   </div>
 
    <script src="stone_script.js">

    </script>
</body>
</html>
